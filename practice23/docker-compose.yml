version: '3.8'

services:
  # Backend сервер 1
  backend1:
    build: ./backend
    container_name: backend-1
    environment:
      - SERVER_ID=backend-1
      - SERVER_COLOR=blue
    networks:
      - app-network
    # healthcheck для мониторинга
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend сервер 2
  backend2:
    build: ./backend
    container_name: backend-2
    environment:
      - SERVER_ID=backend-2
      - SERVER_COLOR=green
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend сервер 3 (резервный)
  backend3:
    build: ./backend
    container_name: backend-3
    environment:
      - SERVER_ID=backend-3
      - SERVER_COLOR=red
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx балансировщик
  nginx:
    image: nginx:alpine
    container_name: nginx-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge