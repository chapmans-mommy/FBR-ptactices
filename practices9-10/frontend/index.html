<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация + Refresh токены</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #0b0f19;
            color: #e7eaf3;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }
        h2 { margin-top: 0; text-align: center; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: white;
            box-sizing: border-box;
        }
        textarea { min-height: 80px; resize: vertical; }
        button {
            width: 100%;
            padding: 12px;
            background: rgba(99, 102, 241, 0.18);
            border: 1px solid rgba(99, 102, 241, 0.55);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 8px;
        }
        button:hover { background: rgba(99, 102, 241, 0.3); }
        button.small {
            width: auto;
            padding: 6px 12px;
            font-size: 14px;
            margin: 0 4px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            word-break: break-all;
        }
        .token {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .user-info { margin-top: 10px; }
        .error { color: #ff6b6b; }
        .success { color: #4ade80; }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-button {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 80px;
        }
        .tab-button.active {
            background: rgba(99, 102, 241, 0.18);
            border-color: rgba(99, 102, 241, 0.55);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .product-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
        }
        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0f1526;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: auto;
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Питомник</h2>
        
        <div class="tab-buttons">
            <button class="tab-button active" onclick="showTab('login')">Вход</button>
            <button class="tab-button" onclick="showTab('register')">Регистрация</button>
            <button class="tab-button" onclick="showTab('profile')">Профиль</button>
            <button class="tab-button" onclick="showTab('products')">Товары</button>
        </div>

        <!--вход-->
        <div id="login-tab" class="tab-content active">
            <h3>Вход</h3>
            <input type="email" id="login-email" placeholder="Email" value="ivanova.v.d@mail.ru">
            <input type="password" id="login-password" placeholder="Пароль" value="90475">
            <button onclick="login()">Войти</button>
        </div>

        <!--регистрация-->
        <div id="register-tab" class="tab-content">
            <h3>Регистрация</h3>
            <input type="email" id="register-email" placeholder="Email">
            <input type="text" id="register-firstname" placeholder="Имя">
            <input type="text" id="register-lastname" placeholder="Фамилия">
            <input type="password" id="register-password" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
        </div>

        <!--профиль-->
        <div id="profile-tab" class="tab-content">
            <h3>Профиль</h3>
            <div id="profile-info"></div>
            <button onclick="getProfile()" style="margin-top: 10px;">Обновить</button>
        </div>

        <!--товары-->
        <div id="products-tab" class="tab-content">
            <h3>Товары</h3>
            <div id="products-list"></div>
            
            <h4 style="margin-top: 20px;">➕ Создать новый товар</h4>
            <input type="text" id="product-title" placeholder="Название">
            <input type="text" id="product-category" placeholder="Категория">
            <textarea id="product-description" placeholder="Описание"></textarea>
            <input type="number" id="product-price" placeholder="Цена">
            <button onclick="createProduct()">Создать товар</button>
        </div>

        <div id="result" class="result"></div>
    </div>

    <!--просмотр/редактирование товара -->
    <div id="product-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Просмотр товара</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modal-body">
            </div>
        </div>
    </div>

    <script>
        //ТОКЕНЫ
        function setTokens(accessToken, refreshToken) {
            localStorage.setItem('accessToken', accessToken);
            localStorage.setItem('refreshToken', refreshToken);
        }

        function getAccessToken() {
            return localStorage.getItem('accessToken');
        }

        function getRefreshToken() {
            return localStorage.getItem('refreshToken');
        }

        function clearTokens() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
        }

        //ФУНКЦИЯ ЗАПРОСА
        async function makeRequest(url, options = {}, retry = true) {
            const accessToken = getAccessToken();
            
            const fetchOptions = {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(accessToken ? { 'Authorization': `Bearer ${accessToken}` } : {}),
                    ...(options.headers || {})
                }
            };

            let response = await fetch(url, fetchOptions);

            if (response.status === 401 && getRefreshToken() && retry) {
                const refreshed = await refreshToken();
                if (refreshed) {
                    return makeRequest(url, options, false);
                } else {
                    clearTokens();
                    showResult({ error: 'Сессия истекла, войдите снова' }, true);
                    showTab('login');
                }
            }

            return response;
        }

        async function refreshToken() {
            const refreshToken = getRefreshToken();
            if (!refreshToken) return false;

            try {
                const response = await fetch('http://localhost:3000/api/auth/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken })
                });

                if (response.ok) {
                    const data = await response.json();
                    setTokens(data.accessToken, data.refreshToken);
                    return true;
                }
                return false;
            } catch (error) {
                return false;
            }
        }

        //UI
        function showTab(tab) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            const tabs = ['login', 'register', 'profile', 'products'];
            const index = tabs.indexOf(tab);
            document.querySelectorAll('.tab-button')[index].classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
            
            if (tab === 'profile' && getAccessToken()) getProfile();
            if (tab === 'products') loadProducts();
        }

        function showResult(data, isError = false) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `<pre class="${isError ? 'error' : 'success'}">${JSON.stringify(data, null, 2)}</pre>`;
            setTimeout(() => { resultDiv.style.display = 'none'; }, 5000);
        }

        //МОДАЛКА
        function openModal(title, content) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = content;
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        //API ВЫЗОВЫ
        async function register() {
            const email = document.getElementById('register-email').value;
            const firstName = document.getElementById('register-firstname').value;
            const lastName = document.getElementById('register-lastname').value;
            const password = document.getElementById('register-password').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, firstName, lastName, password })
                });
                const data = await response.json();
                if (response.ok) {
                    showResult(data);
                    alert('Регистрация успешна! Теперь можно войти.');
                    showTab('login');
                } else {
                    showResult(data, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    setTokens(data.accessToken, data.refreshToken);
                    showResult({ success: true, user: data.user });
                    alert('Вход выполнен! Токены сохранены.');
                    showTab('profile');
                    getProfile();
                } else {
                    showResult(data, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        async function getProfile() {
            try {
                const response = await makeRequest('http://localhost:3000/api/auth/me', { method: 'GET' });
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('profile-info').innerHTML = `
                        <div class="user-info">
                            <p><strong>ID:</strong> ${data.id}</p>
                            <p><strong>Email:</strong> ${data.email}</p>
                            <p><strong>Имя:</strong> ${data.firstName}</p>
                            <p><strong>Фамилия:</strong> ${data.lastName}</p>
                        </div>
                        <div class="token">Access Token: ${getAccessToken().substring(0, 30)}...</div>
                        <div class="token">Refresh Token: ${getRefreshToken().substring(0, 30)}...</div>
                    `;
                    showResult(data);
                } else {
                    showResult(data, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        //УПРАВЛЕНИЕ ТОВАРАМИ
        async function loadProducts() {
            try {
                const response = await fetch('http://localhost:3000/api/products');
                const data = await response.json();
                
                let html = '<h4>Список товаров:</h4>';
                if (data.length === 0) {
                    html += '<p>Товаров пока нет</p>';
                } else {
                    data.forEach(p => {
                        html += `
                            <div class="product-card">
                                <strong>${p.title}</strong> (${p.category})<br>
                                ${p.description}<br>
                                <strong>Цена:</strong> ${p.price} руб.<br>
                                <div class="product-actions">
                                    <button class="small" onclick="viewProduct('${p.id}')">Просмотр</button>
                                    <button class="small" onclick="editProduct('${p.id}')">Редактировать</button>
                                    <button class="small" onclick="deleteProduct('${p.id}')">Удалить</button>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('products-list').innerHTML = html;
            } catch (error) {
                console.error(error);
            }
        }

        async function viewProduct(id) {
            try {
                const response = await fetch(`http://localhost:3000/api/products/${id}`);
                const product = await response.json();
                
                if (response.ok) {
                    openModal('Просмотр товара', `
                        <p><strong>ID:</strong> ${product.id}</p>
                        <p><strong>Название:</strong> ${product.title}</p>
                        <p><strong>Категория:</strong> ${product.category}</p>
                        <p><strong>Описание:</strong> ${product.description}</p>
                        <p><strong>Цена:</strong> ${product.price} руб.</p>
                        <button onclick="closeModal()">Закрыть</button>
                    `);
                } else {
                    showResult(product, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        async function editProduct(id) {
            try {
                
                const response = await fetch(`http://localhost:3000/api/products/${id}`);
                const product = await response.json();
                
                if (response.ok) {
                    openModal('Редактирование товара', `
                        <input type="text" id="edit-id" value="${product.id}" hidden>
                        <label>Название:</label>
                        <input type="text" id="edit-title" value="${product.title}">
                        <label>Категория:</label>
                        <input type="text" id="edit-category" value="${product.category}">
                        <label>Описание:</label>
                        <textarea id="edit-description">${product.description}</textarea>
                        <label>Цена:</label>
                        <input type="number" id="edit-price" value="${product.price}">
                        <button onclick="updateProduct()">Сохранить</button>
                        <button onclick="closeModal()" style="background: transparent; border: 1px solid rgba(255,255,255,0.2);">Отмена</button>
                    `);
                } else {
                    showResult(product, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        async function updateProduct() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value;
            const category = document.getElementById('edit-category').value;
            const description = document.getElementById('edit-description').value;
            const price = document.getElementById('edit-price').value;

            try {
                const response = await makeRequest(`http://localhost:3000/api/products/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ title, category, description, price })
                });
                const data = await response.json();
                
                if (response.ok) {
                    showResult(data);
                    closeModal();
                    loadProducts();
                } else {
                    showResult(data, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Вы уверены, что хотите удалить товар?')) return;

            try {
                const response = await makeRequest(`http://localhost:3000/api/products/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showResult({ message: 'Товар удалён' });
                    loadProducts();
                } else {
                    const data = await response.json();
                    showResult(data, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        async function createProduct() {
            const title = document.getElementById('product-title').value;
            const category = document.getElementById('product-category').value;
            const description = document.getElementById('product-description').value;
            const price = document.getElementById('product-price').value;

            if (!title || !category || !description || !price) {
                alert('Заполните все поля');
                return;
            }

            try {
                const response = await makeRequest('http://localhost:3000/api/products', {
                    method: 'POST',
                    body: JSON.stringify({ title, category, description, price })
                });
                const data = await response.json();
                
                if (response.ok) {
                    showResult(data);
                    document.getElementById('product-title').value = '';
                    document.getElementById('product-category').value = '';
                    document.getElementById('product-description').value = '';
                    document.getElementById('product-price').value = '';
                    loadProducts();
                } else {
                    showResult(data, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        if (getAccessToken()) {
            showTab('profile');
        }
    </script>
</body>
</html>
