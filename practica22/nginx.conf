events {
    worker_connections 1024;
}

http {
    # Группа backend-серверов с настройками отказоустойчивости
    upstream backend {
        # Основные серверы
        server 127.0.0.1:3000 max_fails=2 fail_timeout=30s;
        server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
        
        # Резервный сервер (используется только когда основные недоступны)
        server 127.0.0.1:3002 backup;
    }

    server {
        listen 8080;
        server_name localhost;

        # Основная балансировка
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check эндпоинт
        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }
    }
}