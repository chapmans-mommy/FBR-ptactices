<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="./icons/icon-icons-128-128.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="./icons/icon-icons-16-16.png" sizes="16x16" type="image/ico">

    <title>Мои заметки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>MY NOTES 𓆩♡𓆪 </h1>
        
        <div id="status" class="status online">Онлайн</div>
        
        <form id="note-form" class="form-row">
            <input type="text" id="note-input" placeholder="what d u wanna do?" required>
            <button type="submit">+</button>
        </form>
        
        <div id="notes-list"></div>
    </div>

    <div id="edit-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit your note</h3>
                <button class="close-btn" onclick="closeEditModal()">×</button>
            </div>
            <input type="text" id="edit-input" placeholder="Текст заметки">
            <div class="modal-buttons">
                <button onclick="saveEdit()">save</button>
                <button onclick="closeEditModal()">cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
