<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Web App Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Для Android -->
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Цвет темы для браузера -->
    <meta name="theme-color" content="#667eea">
    
    <!-- Для iOS (иконка на домашний экран) -->
    <link rel="apple-touch-icon" href="./icons/icon-icons-128-128.png">
    
    <!-- Для iOS (статус бар) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Обычная иконка вкладки -->
    <link rel="icon" href="./icons/icon-icons-16-16.png" sizes="16x16" type="image/ico">
    <title>Мои заметки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>MY NOTES 𓆩♡𓆪 </h1>
        
        <div id="status" class="status online">Онлайн</div>
        
        <form id="note-form" class="form-row">
            <input type="text" id="note-input" placeholder="what d u wanna do?" required>
            <button type="submit">+</button>
        </form>
        
        <div id="notes-list"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
